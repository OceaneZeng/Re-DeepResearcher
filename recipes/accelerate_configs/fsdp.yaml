compute_environment: LOCAL_MACHINE
debug: false
# FSDP is primarily for multi-GPU/multi-node training. For a single ROCm DTK GPU, prefer MULTI_GPU/DDP with num_processes=1.
distributed_type: FSDP
downcast_bf16: 'no'
enable_cpu_affinity: false
fsdp_config:
  # Keep activation checkpointing off by default on ROCm single-GPU to avoid complex kernel interactions
  fsdp_activation_checkpointing: false
  # Use conservative wrapping policy to avoid unexpected autowrap on ROCm
  fsdp_auto_wrap_policy: "NO_WRAP"
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  fsdp_forward_prefetch: true
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
# IMPORTANT: set num_processes to 1 on single-GPU systems to avoid spawning more processes than available GPUs
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false