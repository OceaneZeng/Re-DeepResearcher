# Local SFT config for Qwen/Qwen2.5-7B-Instruct
# Minimal flat config for local Windows runs.

model_name_or_path: Qwen/Qwen2.5-7B-Instruct
model_revision: main
torch_dtype: auto
attn_implementation: null
trust_remote_code: false

# Dataset
# The loader in src/open_r1/utils/data.py will prefer local parquet files from ./data if present.
dataset_name: open-r1/Mixture-of-Thoughts
dataset_config: all
dataset_num_proc: 4
eos_token: <|im_end|>

# SFT trainer config
bf16: false
fp16: true
do_eval: false
eval_strategy: no
gradient_accumulation_steps: 8
gradient_checkpointing: true
packing: false
max_grad_norm: 0.2
max_length: 1024
num_train_epochs: 3
output_dir: model/Qwen2.5-7B-Instruct-sft
overwrite_output_dir: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
push_to_hub: false
report_to: []
save_strategy: epoch
save_total_limit: 1
seed: 42
use_liger_kernel: false
warmup_ratio: 0.03
learning_rate: 3.0e-05
logging_strategy: steps
logging_steps: 10
