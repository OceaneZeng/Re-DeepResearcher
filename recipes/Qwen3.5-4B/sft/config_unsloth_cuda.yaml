# Qwen3.5-4B SFT on CUDA with Unsloth
# Usage:
# accelerate launch --config_file recipes/accelerate_configs/ddp.yaml src/open_r1/sft.py --config recipes/Qwen3.5-4B/sft/config_unsloth_cuda.yaml

# -----------------
# ScriptArguments
# -----------------
dataset_name: open-r1/Mixture-of-Thoughts
# dataset_config: all
# dataset_train_split: train
# dataset_test_split: test

# -----------------
# SFTConfig (training args)
# -----------------
output_dir: model/Qwen3.5-4B-sft-unsloth
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
logging_steps: 5
save_steps: 200
save_total_limit: 2
report_to: []

max_seq_length: 4096
packing: false

# CUDA 上优先用 bf16（A100/H100/L40 等），如果你的卡不支持 bf16，改成 fp16=true
bf16: true
fp16: false

gradient_checkpointing: true

# -----------------
# Unsloth knobs
# -----------------
use_unsloth: true
unsloth_load_in_4bit: false   # 想更省显存可改 true（需要 CUDA+bitsandbytes 等）
unsloth_lora_r: 16
unsloth_lora_alpha: 32
unsloth_lora_dropout: 0.05
# unsloth_lora_target_modules: ["q_proj","k_proj","v_proj","o_proj","gate_proj","up_proj","down_proj"]

# -----------------
# ModelConfig (trl.ModelConfig)
# -----------------
model_name_or_path: Qwen/Qwen3.5-4B
trust_remote_code: true
# torch_dtype: bfloat16

