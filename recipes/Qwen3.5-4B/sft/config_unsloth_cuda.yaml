# Qwen3.5-4B SFT on CUDA with Unsloth
# Usage:
# accelerate launch --config_file recipes/accelerate_configs/ddp.yaml src/open_r1/sft.py --config recipes/Qwen3.5-4B/sft/config_unsloth_cuda.yaml

# -----------------
# ScriptArguments
# -----------------
dataset_name: /gz-fs/*.parquet
allow_mixed_parquet_schemas: true
# dataset_config: all
# dataset_train_split: train
# dataset_test_split: test

# -----------------
# SFTConfig (training args)
# -----------------
output_dir: model/Qwen3.5-4B-sft-unsloth
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
logging_steps: 5
save_steps: 200
save_total_limit: 2
report_to: []

max_seq_length: 4096
# 对 SFT 来说 packing=true 通常能明显提升吞吐（更充分利用每个 step 的 token）
packing: true

# RTX 4090 支持 bf16（PyTorch 会在必要时回退）；不行再改 fp16=true
bf16: true
fp16: false

gradient_checkpointing: true

# 4bit/QLoRA 常用优化器（需要 bitsandbytes）；如果你没装 bnb，可改回 adamw_torch
optim: paged_adamw_8bit

# -----------------
# Unsloth knobs
# -----------------
use_unsloth: true
unsloth_load_in_4bit: true
unsloth_local_files_only: false
unsloth_lora_r: 16
unsloth_lora_alpha: 32
unsloth_lora_dropout: 0.05
# unsloth_lora_target_modules: ["q_proj","k_proj","v_proj","o_proj","gate_proj","up_proj","down_proj"]

# -----------------
# ModelConfig (trl.ModelConfig)
# -----------------
model_name_or_path: Qwen/Qwen3.5-4B
trust_remote_code: true
# torch_dtype: bfloat16
